name: Recordatorio Mantenimiento Diario

on:
  schedule:
    # Corre todos los días a las 8:00 AM hora México (CST = UTC-6 → 14:00 UTC)
    - cron: '0 14 * * *'
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar Edge Function de recordatorios
        run: |
          response=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            "https://wwghvummkxekrenfgzsd.supabase.co/functions/v1/send-maintenance-reminders")

          echo "HTTP Status: $response"
          echo "Response body:"
          cat /tmp/response.json

          if [ "$response" != "200" ]; then
            echo "Error: La función retornó status $response"
            exit 1
          fi
